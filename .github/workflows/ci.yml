name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd
      - name: compile-check all modules
        run: python -m py_compile elf_archive.py elf_archive_ext.py nvs_dump.py provision.py rts.py peek_symbols.py
      - name: unit tests
        run: python -m unittest test_elf_archive -v
